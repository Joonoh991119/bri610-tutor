<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="100%" height="auto" font-family="Inter, system-ui, sans-serif" font-size="12">
  <rect width="600" height="360" fill="#fafbfc"/>
  <text x="300" y="22" text-anchor="middle" fill="#1f2328" font-size="14" font-weight="600">
    Mainen &amp; Sejnowski 1995  —  trial-to-trial reliability depends on the stimulus
  </text>

  <!-- LEFT panel: DC injection — unreliable -->
  <text x="160" y="48" text-anchor="middle" fill="#1f2328" font-weight="600">(A) constant DC current</text>
  <text x="160" y="64" text-anchor="middle" fill="#ee6677" font-style="italic">spike timing varies across trials  →  unreliable</text>

  <!-- DC stimulus trace (flat, solid blue) -->
  <line x1="60" y1="84" x2="260" y2="84" stroke="#dee2e7" stroke-width="0.7"/>
  <line x1="60" y1="84" x2="260" y2="84" stroke="#4477aa" stroke-width="2"/>
  <text x="64" y="98" fill="#57606a">I_inj</text>

  <!-- 4 trials of rasters -->
  <!-- trial 1 -->
  <text x="60" y="120" fill="#57606a">tr1</text>
  <line x1="80" y1="116" x2="260" y2="116" stroke="#dee2e7" stroke-width="0.5"/>
  <line x1="100" y1="112" x2="100" y2="120" stroke="#1f2328"/>
  <line x1="138" y1="112" x2="138" y2="120" stroke="#1f2328"/>
  <line x1="180" y1="112" x2="180" y2="120" stroke="#1f2328"/>
  <line x1="225" y1="112" x2="225" y2="120" stroke="#1f2328"/>
  <!-- trial 2 (different timing) -->
  <text x="60" y="140" fill="#57606a">tr2</text>
  <line x1="80" y1="136" x2="260" y2="136" stroke="#dee2e7" stroke-width="0.5"/>
  <line x1="115" y1="132" x2="115" y2="140" stroke="#1f2328"/>
  <line x1="155" y1="132" x2="155" y2="140" stroke="#1f2328"/>
  <line x1="195" y1="132" x2="195" y2="140" stroke="#1f2328"/>
  <line x1="240" y1="132" x2="240" y2="140" stroke="#1f2328"/>
  <!-- trial 3 -->
  <text x="60" y="160" fill="#57606a">tr3</text>
  <line x1="80" y1="156" x2="260" y2="156" stroke="#dee2e7" stroke-width="0.5"/>
  <line x1="92" y1="152" x2="92" y2="160" stroke="#1f2328"/>
  <line x1="148" y1="152" x2="148" y2="160" stroke="#1f2328"/>
  <line x1="172" y1="152" x2="172" y2="160" stroke="#1f2328"/>
  <line x1="218" y1="152" x2="218" y2="160" stroke="#1f2328"/>
  <line x1="248" y1="152" x2="248" y2="160" stroke="#1f2328"/>
  <!-- trial 4 -->
  <text x="60" y="180" fill="#57606a">tr4</text>
  <line x1="80" y1="176" x2="260" y2="176" stroke="#dee2e7" stroke-width="0.5"/>
  <line x1="108" y1="172" x2="108" y2="180" stroke="#1f2328"/>
  <line x1="130" y1="172" x2="130" y2="180" stroke="#1f2328"/>
  <line x1="170" y1="172" x2="170" y2="180" stroke="#1f2328"/>
  <line x1="210" y1="172" x2="210" y2="180" stroke="#1f2328"/>
  <line x1="240" y1="172" x2="240" y2="180" stroke="#1f2328"/>

  <!-- visual: spread of ISIs marked with shaded bands -->
  <rect x="92" y="108" width="26" height="76" fill="#ee6677" opacity="0.10"/>
  <rect x="130" y="108" width="26" height="76" fill="#ee6677" opacity="0.10"/>
  <rect x="170" y="108" width="26" height="76" fill="#ee6677" opacity="0.10"/>
  <rect x="210" y="108" width="40" height="76" fill="#ee6677" opacity="0.10"/>
  <text x="160" y="200" text-anchor="middle" fill="#ee6677" font-style="italic">jitter wide  (≈ 5–20 ms)</text>

  <!-- divider -->
  <line x1="300" y1="40" x2="300" y2="220" stroke="#d0d7de" stroke-width="0.7"/>

  <!-- RIGHT panel: fluctuating noise — reliable -->
  <text x="450" y="48" text-anchor="middle" fill="#1f2328" font-weight="600">(B) fluctuating "frozen-noise" current</text>
  <text x="450" y="64" text-anchor="middle" fill="#228833" font-style="italic">spike timing precise across trials  →  reliable</text>

  <!-- fluctuating stim trace -->
  <path d="M 340 86 L 348 78 L 356 90 L 366 72 L 376 88 L 384 80 L 396 92 L 404 76 L 418 88 L 430 70 L 444 92 L 454 80 L 468 78 L 482 92 L 494 76 L 510 84 L 522 78 L 540 86"
        fill="none" stroke="#228833" stroke-width="1.6"/>
  <text x="344" y="98" fill="#57606a">I_inj</text>

  <!-- 4 trial rasters with aligned spike times -->
  <text x="320" y="120" fill="#57606a">tr1</text>
  <line x1="340" y1="116" x2="540" y2="116" stroke="#dee2e7" stroke-width="0.5"/>
  <line x1="370" y1="112" x2="370" y2="120" stroke="#1f2328"/>
  <line x1="412" y1="112" x2="412" y2="120" stroke="#1f2328"/>
  <line x1="455" y1="112" x2="455" y2="120" stroke="#1f2328"/>
  <line x1="500" y1="112" x2="500" y2="120" stroke="#1f2328"/>

  <text x="320" y="140" fill="#57606a">tr2</text>
  <line x1="340" y1="136" x2="540" y2="136" stroke="#dee2e7" stroke-width="0.5"/>
  <line x1="371" y1="132" x2="371" y2="140" stroke="#1f2328"/>
  <line x1="411" y1="132" x2="411" y2="140" stroke="#1f2328"/>
  <line x1="456" y1="132" x2="456" y2="140" stroke="#1f2328"/>
  <line x1="499" y1="132" x2="499" y2="140" stroke="#1f2328"/>

  <text x="320" y="160" fill="#57606a">tr3</text>
  <line x1="340" y1="156" x2="540" y2="156" stroke="#dee2e7" stroke-width="0.5"/>
  <line x1="370" y1="152" x2="370" y2="160" stroke="#1f2328"/>
  <line x1="413" y1="152" x2="413" y2="160" stroke="#1f2328"/>
  <line x1="455" y1="152" x2="455" y2="160" stroke="#1f2328"/>
  <line x1="501" y1="152" x2="501" y2="160" stroke="#1f2328"/>

  <text x="320" y="180" fill="#57606a">tr4</text>
  <line x1="340" y1="176" x2="540" y2="176" stroke="#dee2e7" stroke-width="0.5"/>
  <line x1="371" y1="172" x2="371" y2="180" stroke="#1f2328"/>
  <line x1="412" y1="172" x2="412" y2="180" stroke="#1f2328"/>
  <line x1="455" y1="172" x2="455" y2="180" stroke="#1f2328"/>
  <line x1="500" y1="172" x2="500" y2="180" stroke="#1f2328"/>

  <!-- precise spike-time bands (narrow) -->
  <rect x="368" y="108" width="6" height="76" fill="#228833" opacity="0.15"/>
  <rect x="410" y="108" width="6" height="76" fill="#228833" opacity="0.15"/>
  <rect x="453" y="108" width="6" height="76" fill="#228833" opacity="0.15"/>
  <rect x="497" y="108" width="6" height="76" fill="#228833" opacity="0.15"/>
  <text x="450" y="200" text-anchor="middle" fill="#228833" font-style="italic">jitter narrow  (&lt; 1 ms)</text>

  <!-- single ochre callout: the punchline -->
  <rect x="150" y="234" width="300" height="56" rx="6" fill="#ccbb44" opacity="0.18" stroke="#ccbb44" stroke-width="1.2"/>
  <text x="300" y="254" text-anchor="middle" fill="#1f2328" font-weight="600">paradox resolved:</text>
  <text x="300" y="270" text-anchor="middle" fill="#1f2328">the neuron is precise (sub-ms) — variability comes from</text>
  <text x="300" y="284" text-anchor="middle" fill="#1f2328">a flat stimulus, not from the cell.</text>

  <text x="60" y="310" fill="#57606a">DC: threshold-crossing time sensitive to channel noise (slowly-drifting V).</text>
  <text x="60" y="324" fill="#57606a">Frozen noise: threshold locked to sharp, repeatable input upswings.</text>
  <text x="60" y="338" fill="#57606a" font-style="italic">Implication: temporal codes are achievable — if the input is time-structured.</text>

  <text x="540" y="352" text-anchor="end" fill="#8c959f" font-size="10">Slide L8 p.74</text>
</svg>
